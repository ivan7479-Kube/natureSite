		<button onclick="purgeCache()">Purge Cache</button>
	<script>
function purgeCache() {
  fetch("https://fastly-purge-api.ivan7479.workers.dev/?key=Purge", {
    method: "POST"
  })
  .then(res => res.json())
  .then(data => {
    alert("Cache purged successfully!");
    console.log(data);
  })
  .catch(err => {
    alert("Error purging cache");
    console.error(err);
  });
}
</script>
<h3>Purge by URL</h3>
<p>Enter the URL path to purge (e.g., /careers.html):</p>
<input type="text" id="purgeUrlInput" placeholder="/careers.html">
<button id="purgeUrlButton">Purge URL</button>
<div id="urlResponse"></div>
<button id="purgeUrlButton">Purge URL</button>
<div id="urlResponse"></div>

<script>
const WORKER_URL = "https://purge-url.ivan7479.workers.dev/"; 
const SECRET_KEY = "Purge"; 

document.getElementById('purgeUrlButton').addEventListener('click', async () => {
    const path = document.getElementById('purgeUrlInput').value.trim();
    if (!path) {
        document.getElementById('urlResponse').textContent = "Please enter a URL path to purge.";
        return;
    }

    document.getElementById('urlResponse').textContent = "Sending purge request...";

    try {
        const res = await fetch(`${WORKER_URL}?key=${SECRET_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path })
        });

        const data = await res.json();
        document.getElementById('urlResponse').textContent = `Purge result: ${JSON.stringify(data)}`;
    } catch (err) {
        console.error(err);
        document.getElementById('urlResponse').textContent = "Error sending purge request. Check console.";
    }
});
</script>
