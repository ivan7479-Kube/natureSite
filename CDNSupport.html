        <button id="clearCloudflare">Clear Cloudflare Cache</button>

    <script src="cdnSupport.js"></script>
	<script>
function purgeCache() {
  fetch("https://fastly-purge-api.ivan7479.workers.dev/?key=Purge", {
    method: "POST"
  })
  .then(res => res.json())
  .then(data => {
    alert("Cache purged successfully!");
    console.log(data);
  })
  .catch(err => {
    alert("Error purging cache");
    console.error(err);
  });
}
</script>
